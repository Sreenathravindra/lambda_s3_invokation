AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: S3 Existing Bucket Integration

Globals:
  Function:
    Timeout: 30

Resources:

  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: s3-folder-trigger-function
      CodeUri: hello_world/
      Handler: app.lambda_handler
      Runtime: python3.11
      Architectures:
        - x86_64

      Policies:
        - S3ReadPolicy:
            BucketName: sreenath-v1

